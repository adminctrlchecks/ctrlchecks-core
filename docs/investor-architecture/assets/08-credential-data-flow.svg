<rect x="700" y="125" width="230" height="100" rx="10" fill="#ffffff" stroke="#c8553d" stroke-width="2"/><text x="815" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Credential Vault</text><text x="815" y="172" text-anchor="middle" font-size="12" fill="#607080">Encrypted tokens and keys</text>
