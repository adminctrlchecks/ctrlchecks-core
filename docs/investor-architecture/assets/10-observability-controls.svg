<rect x="800" y="380" width="220" height="100" rx="10" fill="#ffffff" stroke="#2f6f9f" stroke-width="2"/><text x="910" y="405" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Roadmap Gates</text><text x="910" y="427" text-anchor="middle" font-size="12" fill="#607080">Scale, compliance, enterprise</text><text x="910" y="442" text-anchor="middle" font-size="12" fill="#607080">readiness</text>
