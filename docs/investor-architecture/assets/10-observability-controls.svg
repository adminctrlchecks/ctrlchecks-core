<rect x="640" y="140" width="210" height="95" rx="10" fill="#ffffff" stroke="#4f9d69" stroke-width="2"/><text x="745" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Usage Metrics</text><text x="745" y="187" text-anchor="middle" font-size="12" fill="#607080">AI calls, runs, retries,</text><text x="745" y="202" text-anchor="middle" font-size="12" fill="#607080">latency</text>
<rect x="920" y="140" width="210" height="95" rx="10" fill="#ffffff" stroke="#d49a2a" stroke-width="2"/><text x="1025" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Cost Controls</text><text x="1025" y="187" text-anchor="middle" font-size="12" fill="#607080">AI credits, execution caps,</text><text x="1025" y="202" text-anchor="middle" font-size="12" fill="#607080">overage</text>
<rect x="220" y="380" width="220" height="100" rx="10" fill="#ffffff" stroke="#c8553d" stroke-width="2"/><text x="330" y="405" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Risk Controls</text><text x="330" y="427" text-anchor="middle" font-size="12" fill="#607080">Rate limits, retry budgets,</text><text x="330" y="442" text-anchor="middle" font-size="12" fill="#607080">circuit breakers</text>
