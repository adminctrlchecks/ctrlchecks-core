  <rect x="80" y="140" width="210" height="95" rx="10" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/><text x="185" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Workflow Events</text><text x="185" y="187" text-anchor="middle" font-size="12" fill="#607080">Creation, save, execution,</text><text x="185" y="202" text-anchor="middle" font-size="12" fill="#607080">trigger</text>
