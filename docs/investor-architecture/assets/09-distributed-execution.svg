<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#aeb8c2"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#d7dde3" flood-opacity="0.9"/>
    </filter>
  </defs>
  <rect width="1200" height="660" fill="#f7fafc"/>
  <text x="34" y="42" font-size="24" font-weight="800" fill="#13293d">Distributed Execution: Queue-Backed Scale Path</text>
  <g filter="url(#shadow)">
  <rect x="75" y="160" width="210" height="100" rx="10" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/><text x="180" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Client / Trigger</text><text x="180" y="207" text-anchor="middle" font-size="12" fill="#607080">Starts long or high-volume run</text>
<rect x="360" y="160" width="220" height="100" rx="10" fill="#ffffff" stroke="#2f6f9f" stroke-width="2"/><text x="470" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Distributed API</text><text x="470" y="207" text-anchor="middle" font-size="12" fill="#607080">Enqueue execution job</text>
<rect x="660" y="80" width="220" height="95" rx="10" fill="#ffffff" stroke="#d49a2a" stroke-width="2"/><text x="770" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Redis / Kafka</text><text x="770" y="127" text-anchor="middle" font-size="12" fill="#607080">Queue, pub/sub, dead letters</text>
<rect x="660" y="260" width="220" height="95" rx="10" fill="#ffffff" stroke="#4f9d69" stroke-width="2"/><text x="770" y="285" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Worker Replicas</text><text x="770" y="307" text-anchor="middle" font-size="12" fill="#607080">Consume jobs and run nodes</text>
<rect x="965" y="160" width="170" height="100" rx="10" fill="#ffffff" stroke="#c8553d" stroke-width="2"/><text x="1050" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Status API</text><text x="1050" y="207" text-anchor="middle" font-size="12" fill="#607080">Poll or stream progress</text>
<rect x="660" y="440" width="220" height="95" rx="10" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/><text x="770" y="465" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Persistence</text><text x="770" y="487" text-anchor="middle" font-size="12" fill="#607080">Execution status and logs</text>
<line x1="285" y1="210" x2="360" y2="210" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="580" y1="210" x2="660" y2="128" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="770" y1="175" x2="770" y2="260" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="880" y1="308" x2="965" y2="210" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="770" y1="355" x2="770" y2="440" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="965" y1="210" x2="880" y2="488" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
  </g>
</svg>