<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="690" viewBox="0 0 1300 690">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#aeb8c2"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#d7dde3" flood-opacity="0.9"/>
    </filter>
  </defs>
  <rect width="1300" height="690" fill="#f7fafc"/>
  <text x="34" y="42" font-size="24" font-weight="800" fill="#13293d">Execution Flow: Deterministic Node Runtime</text>
  <g filter="url(#shadow)">
  <rect x="55" y="150" width="210" height="95" rx="10" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/><text x="160" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Run Request</text><text x="160" y="197" text-anchor="middle" font-size="12" fill="#607080">Manual, schedule, webhook,</text><text x="160" y="212" text-anchor="middle" font-size="12" fill="#607080">form, chat</text>
<rect x="325" y="150" width="210" height="95" rx="10" fill="#ffffff" stroke="#4f9d69" stroke-width="2"/><text x="430" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Load Workflow</text><text x="430" y="197" text-anchor="middle" font-size="12" fill="#607080">Workflow JSON and user context</text>
<rect x="595" y="150" width="210" height="95" rx="10" fill="#ffffff" stroke="#d49a2a" stroke-width="2"/><text x="700" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Execution Lock</text><text x="700" y="197" text-anchor="middle" font-size="12" fill="#607080">Avoid duplicate concurrent</text><text x="700" y="212" text-anchor="middle" font-size="12" fill="#607080">runs</text>
<rect x="865" y="150" width="210" height="95" rx="10" fill="#ffffff" stroke="#2f6f9f" stroke-width="2"/><text x="970" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Execution Engine</text><text x="970" y="197" text-anchor="middle" font-size="12" fill="#607080">Plan, resolve templates, route</text><text x="970" y="212" text-anchor="middle" font-size="12" fill="#607080">branches</text>
<rect x="325" y="390" width="210" height="95" rx="10" fill="#ffffff" stroke="#c8553d" stroke-width="2"/><text x="430" y="415" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Dynamic Executor</text><text x="430" y="437" text-anchor="middle" font-size="12" fill="#607080">Registry execute or legacy</text><text x="430" y="452" text-anchor="middle" font-size="12" fill="#607080">adapter</text>
<rect x="595" y="390" width="210" height="95" rx="10" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/><text x="700" y="415" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">External Effects</text><text x="700" y="437" text-anchor="middle" font-size="12" fill="#607080">APIs, databases, AI nodes</text>
<rect x="865" y="390" width="210" height="95" rx="10" fill="#ffffff" stroke="#4f9d69" stroke-width="2"/><text x="970" y="415" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Logs + Results</text><text x="970" y="437" text-anchor="middle" font-size="12" fill="#607080">Outputs, status, duration,</text><text x="970" y="452" text-anchor="middle" font-size="12" fill="#607080">errors</text>
<line x1="265" y1="198" x2="325" y2="198" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="535" y1="198" x2="595" y2="198" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="805" y1="198" x2="865" y2="198" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="970" y1="245" x2="430" y2="390" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="654" y="299.5" width="92" height="20" rx="10" fill="#f7fafc" stroke="#aeb8c2" stroke-width="1"/><text x="700" y="313.5" text-anchor="middle" font-size="11" fill="#607080">per node</text>
<line x1="535" y1="438" x2="595" y2="438" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="805" y1="438" x2="865" y2="438" stroke="#aeb8c2" stroke-width="2.4" marker-end="url(#arrow)"/>
  </g>
</svg>