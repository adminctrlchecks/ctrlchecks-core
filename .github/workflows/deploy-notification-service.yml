name: Deploy Notification Service

on:
  push:
    branches: [master, main]
    paths:
      - 'services/notification-service/**'
      - 'scripts/deploy-notification-service.sh'
      - 'scripts/ctrlchecks-notification-service.service'
      - '.github/workflows/deploy-notification-service.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force deploy even without path changes'
        required: false
        default: 'false'

concurrency:
  group: deploy-notification-service
  cancel-in-progress: false

jobs:
  test:
    name: Type-check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-dist
          path: |
            services/notification-service/dist/
            services/notification-service/package.json
            services/notification-service/package-lock.json
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: notification-service-dist
          path: services/notification-service/

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ctrlchecks.pem
          chmod 600 ~/.ssh/ctrlchecks.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Package and upload
        run: |
          tar -czf /tmp/notification-service-deploy.tar.gz \
            -C services/notification-service \
            dist/ package.json package-lock.json
          scp -i ~/.ssh/ctrlchecks.pem \
            /tmp/notification-service-deploy.tar.gz \
            ubuntu@${{ secrets.EC2_HOST }}:/tmp/notification-service-deploy.tar.gz
          scp -i ~/.ssh/ctrlchecks.pem \
            scripts/ctrlchecks-notification-service.service \
            ubuntu@${{ secrets.EC2_HOST }}:/tmp/ctrlchecks-notification-service.service

      - name: Extract, install, restart
        run: |
          ssh -i ~/.ssh/ctrlchecks.pem ubuntu@${{ secrets.EC2_HOST }} bash << 'REMOTE'
            set -euo pipefail
            TARGET=/opt/ctrlchecks-notification-service

            # Update systemd unit if changed
            if ! diff -q /tmp/ctrlchecks-notification-service.service \
                 /etc/systemd/system/ctrlchecks-notification-service.service &>/dev/null 2>&1; then
              sudo cp /tmp/ctrlchecks-notification-service.service \
                      /etc/systemd/system/ctrlchecks-notification-service.service
              sudo systemctl daemon-reload
              echo "systemd unit updated"
            fi
            rm -f /tmp/ctrlchecks-notification-service.service

            tar -xzf /tmp/notification-service-deploy.tar.gz -C "$TARGET"
            rm /tmp/notification-service-deploy.tar.gz

            cd "$TARGET"
            npm ci --omit=dev
            sudo systemctl restart ctrlchecks-notification-service
            sleep 5

            curl -fsS http://localhost:3005/health/live \
              && echo "health/live OK" \
              || (sudo journalctl -u ctrlchecks-notification-service -n 30 --no-pager && exit 1)
            curl -fsS http://localhost:3005/health/ready \
              && echo "health/ready OK" \
              || exit 1
          REMOTE

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/ctrlchecks.pem

# Required GitHub Secrets:
#   EC2_SSH_PRIVATE_KEY — contents of ctrlchecks-backend.pem
#   EC2_HOST            — 3.7.115.58 (or the instance's domain)
