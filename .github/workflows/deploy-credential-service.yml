name: Deploy Credential Service

# Triggers:
#   - push to master/main when services/credential-service/ changes
#   - workflow_dispatch for manual deploys / hotfixes
#
# Target: root@187.127.185.105 /opt/ctrlchecks-credential-service (Hostinger KVM4)
#
# Deploy strategy (mirrors deploy-worker.yml):
#   1. Build dist/ in CI.
#   2. Backup existing dist/ on server (dist.bak/).
#   3. Upload new tar, extract, npm ci, restart service.
#   4. Health-check retry loop: 5 attempts × 10s.
#   5. On failure: restore dist.bak/ + restart + exit 1.

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'services/credential-service/**'
      - '!services/credential-service/**/*.test.ts'
      - '.github/workflows/deploy-credential-service.yml'
  workflow_dispatch:
    inputs:
      skip_quality_gate:
        description: 'Skip type-check (emergency hotfix only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-credential-service
  cancel-in-progress: false

jobs:
  # ── Quality gate ─────────────────────────────────────────────────────────────
  quality-gate:
    name: Credential Service Quality Gate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_quality_gate != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/credential-service/package-lock.json

      - name: Install dependencies
        working-directory: ./services/credential-service
        run: npm ci

      - name: Type-check
        working-directory: ./services/credential-service
        run: npm run type-check

      # Known pre-existing test failures are tracked separately from this
      # deploy pipeline — informational only, not a deploy blocker.
      - name: Tests (informational)
        working-directory: ./services/credential-service
        run: npm test
        continue-on-error: true

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Credential Service to Hostinger
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always() && (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped')

    env:
      SERVER_HOST: ${{ secrets.HOSTINGER_HOST || '187.127.185.105' }}
      SERVER_USER: root
      SERVER_PATH: /opt/ctrlchecks-credential-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/credential-service/package-lock.json

      - name: Install dependencies
        working-directory: ./services/credential-service
        run: npm ci

      - name: Build
        working-directory: ./services/credential-service
        run: npm run build

      - name: Package dist
        working-directory: ./services/credential-service
        run: |
          tar -czf /tmp/credential-service-deploy.tar.gz \
            dist/ package.json package-lock.json
          echo "Package size: $(du -sh /tmp/credential-service-deploy.tar.gz | cut -f1)"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload package to server
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            /tmp/credential-service-deploy.tar.gz \
            "$SERVER_USER@$SERVER_HOST:/tmp/credential-service-deploy.tar.gz"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_HOST" bash << 'REMOTE'
          set -euo pipefail
          TARGET=/opt/ctrlchecks-credential-service

          echo "── Backup current dist/ ─────────────────────────────────────"
          if [ -d "$TARGET/dist" ]; then
            rm -rf "$TARGET/dist.bak"
            cp -a "$TARGET/dist" "$TARGET/dist.bak"
            echo "✅ dist.bak created"
          else
            echo "⚠  No existing dist/ — skipping backup (first deploy)"
          fi

          echo "── Extract new package ──────────────────────────────────────"
          tar -xzf /tmp/credential-service-deploy.tar.gz -C "$TARGET"
          rm /tmp/credential-service-deploy.tar.gz

          echo "── npm ci ───────────────────────────────────────────────────"
          cd "$TARGET"
          npm ci --omit=dev 2>&1 | tail -5

          echo "── Restart service ──────────────────────────────────────────"
          systemctl restart ctrlchecks-credential-service
          echo "  Waiting 8s for startup..."
          sleep 8
          REMOTE

      - name: Health-check retry loop (5 × 10s)
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Health check attempt $attempt/5..."
            CODE=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              "$SERVER_USER@$SERVER_HOST" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:3004/health/live" 2>/dev/null || echo "000")
            echo "  HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Health check passed on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "  Waiting 10s before retry..."
              sleep 10
            fi
          done
          echo "❌ Health check failed after 5 attempts — initiating rollback"
          exit 1

      - name: Rollback on health-check failure
        if: failure()
        run: |
          echo "── Rolling back to previous dist.bak/ ───────────────────────"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_HOST" bash << 'ROLLBACK'
          set -euo pipefail
          TARGET=/opt/ctrlchecks-credential-service
          if [ -d "$TARGET/dist.bak" ]; then
            rm -rf "$TARGET/dist"
            cp -a "$TARGET/dist.bak" "$TARGET/dist"
            systemctl restart ctrlchecks-credential-service
            sleep 8
            CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3004/health/live)
            if [ "$CODE" = "200" ]; then
              echo "✅ Rollback successful — previous version restored"
            else
              echo "❌ Rollback health check also failed (HTTP $CODE). Manual intervention needed."
            fi
          else
            echo "⚠  No dist.bak/ available — cannot rollback. Manual restore needed."
          fi
          ROLLBACK
          exit 1   # Always fail the job so the team is alerted
