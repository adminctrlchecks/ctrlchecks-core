name: Deploy Frontend (Vercel)

# Triggers on push to master when ctrl_checks/ files change,
# or manual dispatch (e.g. after rotating Vercel tokens / env vars).
#
# Required GitHub Secrets:
#   VERCEL_TOKEN      — from vercel.com → Settings → Tokens
#   VERCEL_ORG_ID     — from vercel.com → Project Settings → General → Team ID
#   VERCEL_PROJECT_ID — from vercel.com → Project Settings → General → Project ID
#
# Build-time env vars (VITE_*) are set in the Vercel project dashboard under
# Settings → Environment Variables so they are baked into every production build.
# You do NOT need to duplicate them here.

on:
  push:
    branches: [master]
    paths:
      - 'ctrl_checks/**'
      - '!ctrl_checks/**/*.md'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force redeploy (e.g. after rotating secrets)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ctrl_checks/package-lock.json

      - name: Install dependencies
        working-directory: ./ctrl_checks
        run: npm ci

      - name: Lint (hard gate)
        working-directory: ./ctrl_checks
        run: npm run lint

      - name: Type-check
        working-directory: ./ctrl_checks
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ctrl_checks/package-lock.json

      - name: Install dependencies
        working-directory: ./ctrl_checks
        run: npm ci

      - name: Deploy to Vercel
        working-directory: ./ctrl_checks
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VITE_PUBLIC_BASE_URL || 'https://app.ctrlchecks.com' }}")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend live: HTTP 200"
          else
            echo "⚠  Status $STATUS — check Vercel dashboard for deployment logs"
          fi
