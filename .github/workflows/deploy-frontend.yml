name: Deploy Frontend (Vercel)

# Triggers on push to master when ctrl_checks/ files change,
# or manual dispatch (e.g. after rotating Vercel tokens / env vars).
#
# Required GitHub Secrets:
#   VERCEL_TOKEN      — from vercel.com → Settings → Tokens
#   VERCEL_ORG_ID     — from vercel.com → Project Settings → General → Team ID
#   VERCEL_PROJECT_ID — from vercel.com → Project Settings → General → Project ID
#
# Build-time env vars (VITE_*) are set in the Vercel project dashboard under
# Settings → Environment Variables so they are baked into every production build.
# You do NOT need to duplicate them here.

on:
  push:
    branches: [master]
    paths:
      - 'ctrl_checks/**'
      - '!ctrl_checks/**/*.md'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force redeploy (e.g. after rotating secrets)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ctrl_checks/package-lock.json

      - name: Install dependencies
        working-directory: ./ctrl_checks
        run: npm ci

      - name: Lint (hard gate)
        working-directory: ./ctrl_checks
        run: npm run lint

      - name: Type-check
        working-directory: ./ctrl_checks
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ctrl_checks/package-lock.json

      - name: Install dependencies
        working-directory: ./ctrl_checks
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Single-command deploy: Vercel builds on its own servers using the
      # project's rootDirectory (ctrl_checks) and env vars from Vercel dashboard.
      # Must run from the repo root (NOT ./ctrl_checks) — the Vercel project's
      # Root Directory setting is already "ctrl_checks", resolved relative to
      # the CLI's cwd. Running this from inside ./ctrl_checks doubles the path
      # to ctrl_checks/ctrl_checks, which doesn't exist (exit code 3).
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel --prod --yes --token=$VERCEL_TOKEN 2>&1 | tail -1)
          echo "Deploy output: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Smoke test
        run: |
          sleep 20
          TARGET="${DEPLOY_URL:-https://app.ctrlchecks.ai}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET")
          echo "Smoke test: $TARGET -> HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Frontend live"
          else
            echo "Status $STATUS - check Vercel dashboard"
          fi
