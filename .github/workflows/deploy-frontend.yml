name: Deploy Frontend (Vercel)

# Triggers on push to master when ctrl_checks/ files change,
# or manual dispatch (e.g. after rotating Vercel tokens / env vars).
#
# Required GitHub Secrets:
#   VERCEL_TOKEN      — from vercel.com → Settings → Tokens
#   VERCEL_ORG_ID     — from vercel.com → Project Settings → General → Team ID
#   VERCEL_PROJECT_ID — from vercel.com → Project Settings → General → Project ID
#
# Build-time env vars (VITE_*) are set in the Vercel project dashboard under
# Settings → Environment Variables so they are baked into every production build.
# You do NOT need to duplicate them here.

on:
  push:
    branches: [master]
    paths:
      - 'ctrl_checks/**'
      - '!ctrl_checks/**/*.md'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force redeploy (e.g. after rotating secrets)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ctrl_checks/package-lock.json

      - name: Install dependencies
        working-directory: ./ctrl_checks
        run: npm ci

      - name: Lint (hard gate)
        working-directory: ./ctrl_checks
        run: npm run lint

      - name: Type-check
        working-directory: ./ctrl_checks
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ctrl_checks/package-lock.json

      - name: Install dependencies
        working-directory: ./ctrl_checks
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify secrets present
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "VERCEL_ORG_ID length:     ${#VERCEL_ORG_ID}"
          echo "VERCEL_PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
          echo "VERCEL_TOKEN length:      ${#VERCEL_TOKEN}"
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "❌ One or more Vercel secrets are empty — check GitHub Secrets"
            exit 1
          fi
          echo "✅ All Vercel secrets are set"

      - name: Pull Vercel project config
        working-directory: ./ctrl_checks
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build for production
        working-directory: ./ctrl_checks
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to Vercel
        working-directory: ./ctrl_checks
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "✅ Deployed: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Smoke test
        run: |
          sleep 15
          TARGET="${DEPLOY_URL:-https://app.ctrlchecks.com}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET")
          echo "Smoke test → $TARGET : HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend live"
          else
            echo "⚠  Status $STATUS — check Vercel dashboard"
          fi
